<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <title>Frontend Mentor | Interactive card details form</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <div class="left-side">
      <div class="cards-box">
        <div class="card-front-container">
          <img src="./images/bg-card-front.png" alt="" class="card1">
          <div class="card-content">
            <img src="./images/card-logo.svg" alt="logo" class="logo">
            <div class="number">0000 0000 0000 0000</div>
            <div class="card-info">
              <div>JANE APPLESEED</div>
              <div>00/00</div>
            </div>
          </div>
        </div>

        <div class="card-back-container">
          <img src="./images/bg-card-back.png" alt="" class="card2">
          <div class="cvc">000</div>
        </div>
      </div>
    </div>
    <div class="right-side">
      <div class="main-form">
        <div class="form">
          <label>CARDHOLDER NAME</label>
          <input type="text" placeholder="e.g. Jane Appleseed">
        </div>
        <div class="form">
          <label>CARD NUMBER</label>
          <input type="text" placeholder="e.g. 1234 5678 9123 0000">
        </div>
        <div class="form-row">
          <div class="form">
            <label>EXP. DATE (MM/YY)</label>
            <div class="row">
              <input type="text" placeholder="MM" class="small">
              <input type="text" placeholder="YY" class="small">
            </div>
          </div>
          <div class="form">
            <label>CVC</label>
            <input type="text" placeholder="e.g. 123" class="cvc2">
          </div>
        </div>
        <button>Confirm</button>
      </div>
    </div>
  </div>
  <!-- 0000 0000 0000 0000
  Jane Appleseed
  00/00

  000

  Cardholder Name
  e.g. Jane Appleseed

  Card Number
  e.g. 1234 5678 9123 0000

  Exp. Date (MM/YY)
  MM
  YY

  CVC
  e.g. 123

  Confirm

  Thank you!
  We've added your card details
  Continue -->

</body>

</html>
