<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="navbar">
        <div class="nav-left">
            <img src="./images/logo.svg" alt="">
            <div class="nav-links">
                <p>Collections</p>
                <p>Men</p>
                <p>Women</p>
                <p>About</p>
                <p>Contact</p>
            </div>
        </div>
        <div class="nav-right">
            <img src="./images/icon-cart.svg" alt="">
            <img src="./images/image-avatar.png" alt="" class="avatar">
        </div>
    </header>

    <main>
        <section class="product-images">
            <div class="main-img-container">
                <img src="./images/image-product-1.jpg" alt="" class="main-img">
            </div>
            <div class="thumbnail-row">
                <div class="thumbnail">
                    <img src="./images/image-product-1-thumbnail.jpg" alt="">
                </div>
                <div class="thumbnail">
                    <img src="./images/image-product-2-thumbnail.jpg" alt="">
                </div>
                <div class="thumbnail">
                    <img src="./images/image-product-3-thumbnail.jpg" alt="">
                </div>
                <div class="thumbnail">
                    <img src="./images/image-product-4-thumbnail.jpg" alt="">
                </div>
            </div>
        </section>

        <section class="product-info">
            <p class="company-name">SNEAKER COMPANY</p>
            <h1 class="product-title">Fall Limited Edition Sneakers</h1>
            <p class="product-description">
                These low-profile sneakers are your perfect casual wear companion Featuring a durable rubber outer sole, they’ll withstand everything the weather can offer.
            </p>

            <div class="pricing">
                <div class="price-row">
                    <p class="current-price">$125.00</p>
                    <p class="discount">50%</p>
                </div>
                <p class="old-price">$250.00</p>
            </div>

            <div class="actions-row">
                <div class="quantity-selector">
                    <img src="./images/icon-minus.svg" alt="">
                    <p class="num0">0</p>
                    <img src="./images/icon-plus.svg" alt="">
                </div>
                <button class="add-btn">
                    <img src="./images/icon-cart.svg" alt="cart" class="btn">
                    <p>Add to cart</p>
                </button>
            </div>
        </section>
    </main>
</body>
</html>
