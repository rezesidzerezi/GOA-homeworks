<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="parent">
    <div id="result">
      <h1 id="h1">Your Result</h1>
      <div id="circle">
        <p id="big-p">76</p>
        <p id="small-p">of 100</p>
      </div>
      <h1 id="h2">Great</h1>
      <p id="p2">You scored higher than 65% of the people who have taken <br> these tests.</p>
    </div>

    <div id="summary">
      <h1 id="h3">Summary</h1>
      <div id="stats">
        <div id="Reaction" class="stats2">
          <div class="text">
            <img src="./assets/images/icon-reaction.svg" alt="">
            <p id="pp1">Reaction</p>
          </div>
          <div class="stat-numbers">
            <p class="ppp1">80 </p><p class="ppp2">/ 100</p>
          </div>
        </div>
        <div id="Memory" class="stats2">
          <div class="text">
            <img src="./assets/images/icon-memory.svg" alt="">
            <p id="pp2">Memory</p>
          </div>
          <div class="stat-numbers">
            <p class="ppp1">92</p> <p class="ppp2">/ 100</p>
          </div>
        </div>
        <div id="Verbal" class="stats2">
          <div class="text">
            <img src="./assets/images/icon-verbal.svg" alt="">
            <p id="pp3">Verbal</p>
          </div>
          <div class="stat-numbers">
            <p class="ppp1">61</p> <p class="ppp2">/ 100</p>
          </div>
        </div>
        <div id="Visual" class="stats2">
          <div class="text">
            <img src="./assets/images/icon-visual.svg" alt="">
            <p id="pp4">Visual</p>
          </div>
          <div class="stat-numbers">
            <p class="ppp1">73</p> <p class="ppp2">/ 100</p>
          </div>
        </div>
      </div>
      <button>Continue</button>
    </div>
  </div>
</body>
</html>
